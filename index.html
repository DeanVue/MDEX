<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ubuntu Desktop Mobile Clone</title>
    <!-- Mengimpor Font Ubuntu Sans & Ubuntu Mono Asli -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Ubuntu+Sans:wght@300;400;500;700&family=Ubuntu+Mono&display=swap">
    <!-- Mengimpor Material Symbols Outlined untuk ikon sistem -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,300,0,0" />
    <style>
        /* --- Core Setup --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            font-family: "Ubuntu Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-user-drag: none;
            touch-action: none; 
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #2c001e;
        }

        /* --- Desktop Wallpaper --- */
        #desktop {
            width: 100%;
            height: 100%;
            position: relative;
            background: radial-gradient(circle at 50% 50%, #661a4e 0%, #3a0d2c 60%, #1e0016 100%);
            background-size: cover;
            background-position: center;
            overflow: hidden;
        }

        /* --- Ubuntu GNOME Top Bar --- */
        #top-bar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 24px;
            background: #111111;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 10px;
            font-size: 11px;
            color: #eeeeee;
            font-weight: 400;
            z-index: 1001; 
        }
        
        #top-bar-activities {
            font-size: 11px;
            font-weight: 500;
            color: #ffffff;
            cursor: pointer;
        }

        .top-bar-center {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            font-weight: 500;
        }

        .status-indicators {
            display: flex;
            gap: 6px;
            align-items: center;
        }
        .status-indicators .material-symbols-outlined {
            font-size: 14px; 
            color: #eeeeee;
        }
        .status-indicators span {
            font-size: 10px;
        }

        /* --- Ubuntu Left Dock / Sidebar --- */
        #launcher {
            position: absolute;
            top: 24px; 
            left: 0;
            bottom: 0;
            width: 56px; 
            background: #111111; 
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 12px 0 8px 0;
            gap: 12px;
            z-index: 1000; 
            transition: transform 0.25s cubic-bezier(0.1, 0.9, 0.2, 1);
            will-change: transform;
        }

        .launcher-apps-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            width: 100%;
            overflow-y: auto;
        }
        
        .launcher-icon {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .launcher-icon:active {
            background: rgba(255, 255, 255, 0.1);
        }
        
        .launcher-icon img {
            width: 32px;
            height: 32px;
            object-fit: contain;
            border-radius: 4px;
            pointer-events: none; 
        }

        .app-grid-icon {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 3px;
            width: 18px;
            height: 18px;
            padding: 2px;
            pointer-events: none;
        }
        .grid-dot {
            background-color: #ffffff;
            border-radius: 50%;
        }

        /* AREA SWIPE TRANSPARAN SAAT BUKA */
        #sidebar-drag-handle {
            position: absolute;
            top: 0;
            bottom: 0;
            right: -25px; 
            width: 25px;
            background: transparent;
            cursor: ew-resize;
        }

        /* ZONA INTERAKSI TEPI KIRI (FASE TUTUP) */
        #sidebar-touch-zone {
            position: absolute;
            top: 24px; 
            left: 0;
            bottom: 0;
            width: 35px;
            z-index: 1002;
            background: transparent;
            display: none;
        }
        
        /* TOMBOL ARROW KECIL (FASE TUTUP) - CLEAN TANPA BG */
        #sidebar-show-btn {
            position: absolute;
            top: 50%;
            left: 2px;
            transform: translateY(-50%);
            background: transparent;
            border: none;
            color: rgba(233, 84, 32, 0.8);
            width: 24px;
            height: 35px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            display: none;
            outline: none;
            z-index: 1003;
        }
        #sidebar-show-btn:active {
            color: rgba(255, 255, 255, 1);
        }

        /* --- Ubuntu Window Style --- */
        .window {
            position: absolute;
            width: 230px;
            height: 280px;
            min-width: 160px;
            min-height: 140px;
            background: #f2f1f0;
            border-radius: 6px 6px 4px 4px;
            border: 1px solid #3c3b37;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            z-index: 10;
        }
        .window-header {
            height: 30px;
            background: linear-gradient(to bottom, #3c3b37, #32312d);
            border-bottom: 1px solid #2a2926;
            display: flex;
            flex-direction: row-reverse;
            justify-content: space-between;
            align-items: center;
            padding: 0 8px;
            cursor: move;
        }
        .window-title {
            font-size: 12px;
            font-weight: 400;
            color: #dfdbd2;
            flex: 1;
            text-align: center;
            margin-right: 20px;
        }
        .window-controls {
            display: flex;
            gap: 5px;
        }
        .win-btn {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #44433e;
            border: 1px solid #2a2926;
            color: #dfdbd2;
            font-size: 9px;
            font-weight: bold;
        }
        .win-close:hover { background: #E95420; color: #ffffff; }
        .win-min:hover { background: #77216F; color: #ffffff; }
        
        .window-content {
            flex: 1;
            padding: 10px;
            overflow: auto;
            background: #ffffff;
            color: #333333;
            font-size: 13px;
            touch-action: auto;
        }

        /* --- Apps Layouts --- */
        .terminal-body {
            background: #300a24;
            color: #ffffff;
            font-family: "Ubuntu Mono", 'Courier New', Courier, monospace;
            font-size: 12px;
            display: flex;
            flex-direction: column;
        }
        .terminal-output {
            flex: 1;
            white-space: pre-wrap;
            overflow-y: auto;
            margin-bottom: 5px;
            line-height: 1.4;
        }
        .terminal-input-line {
            display: flex;
            align-items: center;
        }
        .terminal-prompt {
            color: #8ae234;
            margin-right: 5px;
            font-weight: bold;
        }
        .terminal-input {
            flex: 1;
            background: transparent;
            border: none;
            color: #ffffff;
            font-family: inherit;
            font-size: inherit;
            outline: none;
        }
        .notepad-textarea {
            width: 100%;
            height: 100%;
            border: none;
            resize: none;
            outline: none;
            font-family: inherit;
            color: #333333;
            background: transparent;
            line-height: 1.5;
        }
        .files-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            text-align: center;
        }
        .file-item {
            padding: 8px 4px;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }
        .file-item:active { background: #dfdbd2; }
        .file-folder-icon {
            width: 32px;
            height: 32px;
            background: #df4a16;
            border-radius: 4px;
        }
        .file-name { font-size: 11px; color: #333333; font-weight: 400; }

        /* --- UPDATE DETAIL: Ubuntu App Drawer Style (Grid 3 Kolom Bebas Kebawah) --- */
        #app-drawer {
            position: absolute;
            top: 24px; 
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(16, 16, 16, 0.85);
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px);
            z-index: 999; 
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 25px 20px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease-in-out;
        }
        
        #app-drawer.active {
            opacity: 1;
            pointer-events: auto;
        }

        .drawer-search-container {
            width: 100%;
            max-width: 450px;
            margin-bottom: 30px;
        }
        .drawer-search-input {
            width: 100%;
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.1);
            color: #ffffff;
            font-size: 13px;
            outline: none;
            text-align: center;
            touch-action: elevation;
        }
        .drawer-search-input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        /* PERBAIKAN: Set agar grid membagi rata tepat 3 kolom kesamping */
        .drawer-grid {
            width: 100%;
            max-width: 320px;   /* Batas lebar ideal area grid 3 kolom di layar ponsel */
            max-height: 70%;    /* Batas tinggi maksimum responsif */
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* MATRIKS 3 KOLOM: [] [] [] */
            gap: 24px 16px;     /* Jarak vertikal 24px, horizontal 16px */
            overflow-y: auto;   /* Jika aplikasi bertambah banyak ke bawah, otomatis bisa di-scroll */
            justify-items: center;
            align-content: start;
            touch-action: pan-y; /* Mendukung gesture usap scroll naik-turun */
            padding: 10px;
        }
        
        /* Mengembalikan orientasi ikon di atas dan tulisan di bawah agar simetris di grid 3 kolom */
        .drawer-app-item {
            display: flex;
            flex-direction: column; 
            align-items: center;
            text-align: center;
            gap: 8px;
            cursor: pointer;
            width: 75px;
        }
        .drawer-app-item:active {
            transform: scale(0.9);
        }
        .drawer-app-item img {
            width: 44px;
            height: 44px;
            object-fit: contain;
        }
        .drawer-app-name {
            color: #e6e6e6;
            font-size: 11px;
            font-weight: 400;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 100%;
        }
    </style>
</head>
<body>

    <div id="desktop">
        
        <!-- --- Top Bar --- -->
        <div id="top-bar">
            <div id="top-bar-activities" onclick="toggleAppDrawer()">Activities</div>
            <div class="top-bar-center" id="live-clock">Oct 23 12:20</div>
            
            <div class="status-indicators">
                <span class="material-symbols-outlined">wifi</span>
                <span class="material-symbols-outlined">volume_up</span>
                <span class="material-symbols-outlined">battery_50</span>
                <span>87%</span>
            </div>
        </div>

        <!-- --- Side Dock / Sidebar --- -->
        <div id="launcher">
            <div class="launcher-apps-container" id="apps-container">
                <div class="launcher-icon" onclick="openApp('terminal')">
                    <img src="/asset/app/icons/terminal.png" alt="Terminal">
                </div>
                <div class="launcher-icon" onclick="alert('Firefox Simulator Only')">
                    <img src="/asset/app/icons/firefox.png" alt="Firefox">
                </div>
                <div class="launcher-icon" onclick="openApp('files')">
                    <img src="/asset/app/icons/nautilus.png" alt="Files">
                </div>
                <div class="launcher-icon" onclick="openApp('notepad')">
                    <img src="/asset/app/icons/gedit.png" alt="Editor">
                </div>
                <div class="launcher-icon" onclick="alert('Settings Simulator Only')">
                    <img src="/asset/app/icons/settings.png" alt="Settings">
                </div>
            </div>
            
            <div class="launcher-icon" onclick="toggleAppDrawer()" style="margin-top: auto;">
                <div class="app-grid-icon">
                    <div class="grid-dot"></div><div class="grid-dot"></div><div class="grid-dot"></div>
                    <div class="grid-dot"></div><div class="grid-dot"></div><div class="grid-dot"></div>
                    <div class="grid-dot"></div><div class="grid-dot"></div><div class="grid-dot"></div>
                </div>
            </div>

            <!-- AREA SWIPE TRANSPARAN SAAT BUKA -->
            <div id="sidebar-drag-handle"></div>
        </div>

        <!-- --- Ubuntu App Drawer Component --- -->
        <div id="app-drawer">
            <div class="drawer-search-container">
                <input type="text" class="drawer-search-input" placeholder="Type to search..." autocomplete="off">
            </div>
            
            <!-- TAMPILAN MATRIKS GRID 3 KOLOM SEPERTI KEBUTUHANMU -->
            <div class="drawer-grid">
                <!-- Baris 1 -->
                <div class="drawer-app-item" onclick="openAppFromDrawer('terminal')">
                    <img src="/asset/app/icons/terminal.png" alt="Terminal">
                    <div class="drawer-app-name">Terminal</div>
                </div>
                <div class="drawer-app-item" onclick="toggleAppDrawer(); alert('Firefox Simulator Only');">
                    <img src="/asset/app/icons/firefox.png" alt="Firefox">
                    <div class="drawer-app-name">Firefox</div>
                </div>
                <div class="drawer-app-item" onclick="openAppFromDrawer('files')">
                    <img src="/asset/app/icons/nautilus.png" alt="Files">
                    <div class="drawer-app-name">Files</div>
                </div>
                
                <!-- Baris 2 (Otomatis turun ke bawah karena sistem grid) -->
                <div class="drawer-app-item" onclick="openAppFromDrawer('notepad')">
                    <img src="/asset/app/icons/gedit.png" alt="Text Editor">
                    <div class="drawer-app-name">Text Editor</div>
                </div>
                <div class="drawer-app-item" onclick="toggleAppDrawer(); alert('Settings Simulator Only');">
                    <img src="/asset/app/icons/settings.png" alt="Settings">
                    <div class="drawer-app-name">Settings</div>
                </div>
            </div>
        </div>

        <!-- AREA DETEKSI DI TEPI LAYAR -->
        <div id="sidebar-touch-zone"></div>
        <!-- TOMBOL ARROW KECIL TRANSPARAN -->
        <button id="sidebar-show-btn">❯</button>

        <!-- --- Windows Container --- -->
        <div id="window-layer"></div>

    </div>

    <!-- --- Core Logic --- -->
    <script>
        let highestZ = 10;
        let isSidebarHidden = false;

        function updateClock() {
            const now = new Date();
            const options = { month: 'short', day: 'numeric' };
            const dateStr = now.toLocaleDateString('en-US', options);
            const timeStr = now.toTimeString().substring(0, 5);
            document.getElementById('live-clock').innerText = `${dateStr} ${timeStr}`;
        }
        setInterval(updateClock, 1000);
        updateClock();

        function toggleAppDrawer() {
            const drawer = document.getElementById('app-drawer');
            drawer.classList.toggle('active');
            
            if (drawer.classList.contains('active')) {
                hideSidebar();
                document.getElementById('sidebar-show-btn').style.display = 'none';
            } else {
                showSidebar();
            }
        }

        function openAppFromDrawer(type) {
            toggleAppDrawer(); 
            openApp(type);
        }

        function openApp(type) {
            if (document.getElementById(`win-${type}`)) {
                bringToFront(document.getElementById(`win-${type}`));
                document.getElementById(`win-${type}`).style.display = 'flex';
                return;
            }

            const win = document.createElement('div');
            win.id = `win-${type}`;
            win.className = 'window';
            
            win.style.left = isSidebarHidden ? '15px' : '68px';
            win.style.top = '40px';
            highestZ++;
            win.style.zIndex = highestZ;

            let title = '';
            let contentHTML = '';

            if (type === 'terminal') {
                title = 'ubuntu@gnome:~';
                contentHTML = `
                    <div class="window-content terminal-body" onclick="document.getElementById('term-in').focus()">
                        <div class="terminal-output" id="term-out">Welcome to Ubuntu GNOME Mobile v1.5\nType 'help' for available commands.\n\n</div>
                        <div class="terminal-input-line">
                            <span class="terminal-prompt">ubuntu@gnome:~$</span>
                            <input type="text" id="term-in" class="terminal-input" autocomplete="off" autofocus>
                        </div>
                    </div>`;
            } else if (type === 'notepad') {
                title = 'Text Editor';
                contentHTML = `<div class="window-content"><textarea class="notepad-textarea" placeholder="Start typing..."></textarea></div>`;
            } else if (type === 'files') {
                title = 'Files';
                contentHTML = `
                    <div class="window-content">
                        <div class="files-grid">
                            <div class="file-item"><div class="file-folder-icon" style="background:#e95420"></div><div class="file-name">Documents</div></div>
                            <div class="file-item"><div class="file-folder-icon" style="background:#df4a16"></div><div class="file-name">Downloads</div></div>
                            <div class="file-item"><div class="file-folder-icon" style="background:#77216f"></div><div class="file-name">Pictures</div></div>
                        </div>
                    </div>`;
            }

            win.innerHTML = `
                <div class="window-header">
                    <div class="window-controls">
                        <button class="win-btn win-close" onclick="this.closest('.window').remove()">×</button>
                        <button class="win-btn win-min" onclick="this.closest('.window').style.display='none'">−</button>
                    </div>
                    <span class="window-title">${title}</span>
                </div>
                ${contentHTML}
            `;

            document.getElementById('window-layer').appendChild(win);
            makeDraggable(win);
            win.addEventListener('pointerdown', () => bringToFront(win));

            if (type === 'terminal') {
                initTerminal();
            }
        }

        function bringToFront(win) {
            highestZ++;
            win.style.zIndex = highestZ;
        }

        function makeDraggable(win) {
            const header = win.querySelector('.window-header');
            
            header.addEventListener('pointerdown', function(e) {
                if (e.target.classList.contains('win-btn')) return;
                bringToFront(win);
                
                let shiftX = e.clientX - win.getBoundingClientRect().left;
                let shiftY = e.clientY - win.getBoundingClientRect().top;

                header.setPointerCapture(e.pointerId);

                function onPointerMove(e) {
                    let newX = e.clientX - shiftX;
                    let newY = e.clientY - shiftY;
                    
                    let minX = isSidebarHidden ? 0 : 56;
                    if (newX < minX) newX = minX;
                    if (newY < 24) newY = 24;

                    win.style.left = newX + 'px';
                    win.style.top = newY + 'px';
                }

                function onPointerUp() {
                    header.removeEventListener('pointermove', onPointerMove);
                    header.removeEventListener('pointerup', onPointerUp);
                    header.releasePointerCapture(e.pointerId);
                }

                header.addEventListener('pointermove', onPointerMove);
                header.addEventListener('pointerup', onPointerUp);
            });
        }

        /* --- Logika Gestur Dua Fase Tepi Layar --- */
        const launcher = document.getElementById('launcher');
        const dragHandle = document.getElementById('sidebar-drag-handle');
        const touchZone = document.getElementById('sidebar-touch-zone');
        const showBtn = document.getElementById('sidebar-show-btn');
        
        let startX = 0;
        let isDragging = false;
        let lastTap = 0;

        launcher.addEventListener('pointerdown', (e) => {
            if (e.target.closest('.launcher-icon') && !e.target.id === 'sidebar-drag-handle') return;

            startX = e.clientX;
            isDragging = false;
            launcher.setPointerCapture(e.pointerId);

            function onPointerMove(ev) {
                let diffX = ev.clientX - startX;
                if (Math.abs(diffX) > 8) {
                    isDragging = true;
                }
                if (isDragging && diffX <= 0) {
                    launcher.style.transition = 'none';
                    launcher.style.transform = `translateX(${diffX}px)`;
                }
            }

            function onPointerUp(ev) {
                launcher.removeEventListener('pointermove', onPointerMove);
                launcher.removeEventListener('pointerup', onPointerUp);
                launcher.releasePointerCapture(e.pointerId);
                
                launcher.style.transition = 'transform 0.2s cubic-bezier(0.1, 0.9, 0.2, 1)';
                
                if (isDragging) {
                    let currentTransform = new WebKitCSSMatrix(window.getComputedStyle(launcher).transform).m41;
                    if (currentTransform < -15) {
                        hideSidebar();
                    } else {
                        launcher.style.transform = 'translateX(0px)';
                    }
                }
            }

            launcher.addEventListener('pointermove', onPointerMove);
            launcher.addEventListener('pointerup', onPointerUp);
        });

        launcher.addEventListener('click', (e) => {
            if (isDragging) {
                e.preventDefault();
                e.stopPropagation();
            }
        }, true);

        function hideSidebar() {
            launcher.style.transform = 'translateX(-57px)';
            isSidebarHidden = true;
            dragHandle.style.pointerEvents = 'none';
            touchZone.style.display = 'block';
            showBtn.style.display = 'block';
        }

        function showSidebar() {
            launcher.style.transition = 'transform 0.25s cubic-bezier(0.1, 0.9, 0.2, 1)';
            launcher.style.transform = 'translateX(0px)';
            isSidebarHidden = false;
            dragHandle.style.pointerEvents = 'auto';
            touchZone.style.display = 'none';
            showBtn.style.display = 'none';
        }

        showBtn.addEventListener('click', showSidebar);

        touchZone.addEventListener('pointerdown', (e) => {
            const now = Date.now();
            const TIMESLOT = 250;
            
            if ((now - lastTap) < TIMESLOT) {
                showSidebar();
            }
            lastTap = now;
        });

        function initTerminal() {
            const input = document.getElementById('term-in');
            const output = document.getElementById('term-out');
            if(!input) return;

            input.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    const cmd = input.value.trim().toLowerCase();
                    output.innerText += `ubuntu@gnome:~$ ${input.value}\n`;
                    
                    if (cmd === 'help') {
                        output.innerText += "Available commands: help, clear, about\n";
                    } else if (cmd === 'clear') {
                        output.innerText = "";
                    } else if (cmd === 'about') {
                        output.innerText += "Ubuntu GNOME Mobile Simulator v1.5\n";
                    } else if (cmd !== "") {
                        output.innerText += `Command not found: ${cmd}\n`;
                    }
                    
                    input.value = "";
                    output.scrollTop = output.scrollHeight;
                }
            });
        }
    </script>
</body>
</html>
